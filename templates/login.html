<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>login · domain-scraper</title>
<style>
  :root {
    --bg: #0f1115; --panel: #151920; --fg: #e6e8eb; --muted: #8a93a0;
    --accent: #4f8cff; --border: #232830; --err: #ef5b5b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0; background: var(--bg); color: var(--fg);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh; display: grid; place-items: center;
  }
  form {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 28px; width: 360px;
  }
  h1 { margin: 0 0 4px 0; font-size: 18px; }
  p.sub { color: var(--muted); margin: 0 0 20px; font-size: 13px; }
  label { display: block; margin: 12px 0 4px; font-size: 13px; color: var(--muted); }
  input {
    width: 100%; background: #0d1015; color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 9px 10px; font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; margin-top: 18px; padding: 10px;
    background: var(--accent); color: white; border: 0;
    border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .err {
    margin-top: 14px; padding: 8px 10px; border-radius: 6px;
    background: rgba(239, 91, 91, 0.12); color: var(--err); font-size: 13px;
  }
</style>
</head>
<body>
<form method="POST">
  <h1>domain-scraper</h1>
  <p class="sub">sign in to continue</p>
  <label for="username">username</label>
  <input type="text" id="username" name="username" autocomplete="username" autofocus required>
  <label for="password">password</label>
  <input type="password" id="password" name="password" autocomplete="current-password" required>
  <button type="submit">Sign in</button>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
</form>
</body>
</html>
